server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # Serve custom frontend static files and handle SPA routing for paths like /leaderboard
    location / {
        root /var/www/html/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Pass API requests directly to Flarum PHP-FPM with internal PHP handling
    location /api {
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass app:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            fastcgi_param HTTP_PROXY "";
        }
    }

    # Direct PHP processing for Flarum backend and general PHP files
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
    }
}
