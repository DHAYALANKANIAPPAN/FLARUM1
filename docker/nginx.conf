server {
    listen 80;
    server_name _;

    index index.php index.html;

    # Pass API requests directly to Flarum app backend
    location /api {
        proxy_pass http://app:9000; # or use fastcgi if your setup routes through php-fpm
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Serve custom frontend static files and handle SPA fallback for all routes like /leaderboard
    location / {
        root /var/www/html/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Direct PHP processing for backend files
    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
    }
}
