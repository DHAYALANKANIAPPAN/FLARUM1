server {
    listen 80;
    server_name _;

    # Root for your custom HTML/JS/CSS frontend
    root /var/www/html/frontend;
    index index.html;

    # Serve static frontend files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Direct ALL /api requests straight to Flarum PHP-FPM
    location /api {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Serve Flarum assets/uploads if needed
    location /assets {
        alias /var/www/html/public/assets;
        try_files $uri =404;
    }
}

    # Pass general php files if needed
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
    }
}

    # Pass API requests to Flarum PHP-FPM container
    location /api {
        alias /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            include fastcgi_params;
        }
    }
}
