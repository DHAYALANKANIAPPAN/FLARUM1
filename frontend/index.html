<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecurity Forum</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Top Navigation Header -->
    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">🛡️</span> CyberSecurity Forum
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search forum...">
        </div>
        <div class="auth-section" id="auth-section">
            <!-- Dynamically filled by app.js: Login/Register OR User Badge/Logout -->
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <button class="btn-primary" onclick="openNewDiscussionModal()">✏️ Start a Discussion</button>
            <nav class="nav-menu">
                <button class="nav-item active" data-filter="recent" onclick="loadFilter('recent')">🕒 Recent Discussions</button>
                <button class="nav-item" data-filter="best-answer" onclick="loadFilter('best-answer')">✅ Best Answer Marked</button>
                <button class="nav-item" data-filter="pinned" onclick="loadFilter('pinned')">📌 Pinned by Admin</button>
                <a href="/leaderboard" class="nav-item">🏆 Leaderboard / Scoreboard</a>
            </nav>
        </aside>

        <!-- Main Feed Section -->
        <main class="feed-container">
            <h2 id="feed-title">Recent Discussions</h2>
            <div id="discussions-list" class="discussions-list">
                <!-- Discussions rendered here via JavaScript -->
            </div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('login-modal')">&times;</span>
            <h3>Sign In</h3>
            <form id="login-form" onsubmit="handleLogin(event)">
                <input type="text" id="login-identification" placeholder="Username or Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('register-modal')">&times;</span>
            <h3>Create Account</h3>
            <form id="register-form" onsubmit="handleRegister(event)">
                <input type="text" id="reg-username" placeholder="Username" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Register</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
