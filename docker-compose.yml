services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: flarum1-app
    restart: always
    ports:
      - "8000:80"
    environment:
      - DB_HOST=db
      - DB_NAME=flarum
      - DB_USER=flarum
      - DB_PASS=secret
      - APP_URL=http://16.16.159.159:8000
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: flarum1-db-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: flarum
      MYSQL_USER: flarum
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
