db:
    container_name: flarum1-db-1
    image: mariadb:10.11
    environment:
      MYSQL_DATABASE: flarum
      MYSQL_USER: flarum
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flarum", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: flarum1-app
    depends_on:
      db:
        condition: service_healthy   # <-- was service_started
    environment:
      APP_URL: http://16.16.159.159:8000
      DB_HOST: db
      DB_NAME: flarum
      DB_USER: flarum
      DB_PASS: secret
    volumes:
      - flarum_public:/var/www/html/public
      - flarum_storage:/var/www/html/storage
    restart: always
