services:
  db:
    container_name: flarum1-db-1
    image: mariadb:10.11
    environment:
      APP_URL: "http://54.196.68.171:8000"
      DB_HOST: db
      DB_NAME: flarum
      DB_USER: flarum
      DB_PASS: secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flarum", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: flarum1-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_URL: "http://16.16.159.159:8000"
      DB_HOST: db
      DB_NAME: flarum
      DB_USER: flarum
      DB_PASS: secret
    volumes:
      - flarum_public:/var/www/html/public
      - flarum_storage:/var/www/html/storage
    restart: always

  nginx:
    container_name: flarum1-nginx-1
    image: nginx:alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "8000:80"
    volumes:
      - flarum_public:/var/www/html/public:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

volumes:
  db_data:
    name: flarum1_db_data
  flarum_public:
  flarum_storage:
