services:
  app:
    build: .
    container_name: flarum1-app
    restart: always
    volumes:
      - .:/var/www/html # Or ensure the volume points to the web root
      - /var/www/html/storage
      - /var/www/html/assets
    environment:
      - DB_HOST=db
      - DB_NAME=flarum
      - DB_USER=flarum
      - DB_PASS=secret
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: flarum1-nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      # 1. Mount your custom Nginx configuration file
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      # 2. CRITICAL: Share the same app code volume so Nginx can access /var/www/html/public
      - .:/var/www/html
    depends_on:
      - app

  db:
    image: mariadb:10.11
    container_name: flarum1-db-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: flarum
      MYSQL_USER: flarum
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
