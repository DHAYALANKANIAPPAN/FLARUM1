services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: flarum1-app
    restart: always
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=flarum
      - DB_USER=flarum
      - DB_PASS=secret
      - APP_URL=http://16.16.159.159:8000
    depends_on:
      - db
